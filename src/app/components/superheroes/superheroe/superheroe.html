<div class="card heroe-card">
    <div class="card-img-top">
        <img [src]="'http://localhost:5000/images/' + heroe.imagen" class="card-img-top" alt="{{ heroe.nombre }}">
    </div>

    <div class="card-body">
        <div class="d-flex">
            <h5 class="card-title">{{ heroe.nombre }}</h5>
            @if(esFavorito) {
            <button type="button" class="btn btn-warning btn-fav" (click)="pulsarFavorito()">
                ⭐
            </button>
            } @else {
            <button type="button" class="btn btn-outline-warning btn-fav" (click)="pulsarFavorito()">
                ☆
            </button>
            }
        </div>
        <p class="card-text">{{ heroe.descripcion }}</p>
    </div>

    @if(edicionHabilitada){
    <div class="card-buttons">
        <button class="btn btn-danger" (click)="expulsarHeroe()">Expulsar</button>
        <button class="btn btn-warning" (click)="editarHeroe()">Editar</button>
    </div>
    }
</div>
